  <text x="540" y="680" text-anchor="middle" class="s-serif" font-size="600" fill="#FAF5EB">S</text>
  <circle cx="730" cy="650" r="28" fill="#EF4444"/>

  <text x="150" y="560" text-anchor="middle" class="s-serif" font-size="80" fill="#EF4444">§</text>
  <text x="930" y="560" text-anchor="middle" class="s-serif" font-size="80" fill="#EF4444">§</text>

  <text x="540" y="920" text-anchor="middle" class="s-meta" font-size="26" fill="#FAF5EB">EST · 2026 · MALAPPURAM</text>
