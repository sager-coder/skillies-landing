<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Skillies.AI — Instagram charcoal">
  <defs>
    <style>
      .s-serif { font-family: 'Instrument Serif', 'Times New Roman', Georgia, serif; font-style: italic; font-weight: 400; }
      .s-meta  { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: 0.34em; text-transform: uppercase; }
    </style>
    <path id="topArcD" d="M 180,540 A 360,360 0 0 1 900,540" fill="none"/>
    <path id="botArcD" d="M 200,540 A 340,340 0 0 0 880,540" fill="none"/>
    <filter id="grainD" x="0" y="0" width="100%" height="100%">
