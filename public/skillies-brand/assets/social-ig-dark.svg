  <circle cx="540" cy="540" r="440" fill="none" stroke="#FAF5EB" stroke-width="8"/>
  <circle cx="540" cy="540" r="420" fill="none" stroke="#FAF5EB" stroke-width="2" opacity="0.30"/>
  <circle cx="540" cy="540" r="320" fill="none" stroke="#FAF5EB" stroke-width="1.5" opacity="0.18"/>

  <text class="s-meta" font-size="34" fill="#FAF5EB">
    <textPath href="#topArcD" startOffset="50%" text-anchor="middle">SKILLIES · DOT · AI · SKILLIES · DOT · AI</textPath>
  </text>
  <text class="s-meta" font-size="28" fill="#EF4444">
    <textPath href="#botArcD" startOffset="50%" text-anchor="middle">FIND WHAT PAYS · TEACH IT PLAINLY</textPath>
